<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking Portal — Deposit</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-light">

  <!-- Navigation bar -->
  <nav class="navbar navbar-expand-md navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/dashboard">&#127963; SecureBank</a>
      <div class="ms-auto">
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-5">

        <!-- Back link -->
        <a href="/dashboard" class="text-decoration-none text-muted small mb-3 d-inline-block">
          &larr; Back to Dashboard
        </a>

        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">

            <h2 class="h5 fw-semibold mb-1">Deposit Funds</h2>
            <p class="text-muted small mb-4">Add money to your account</p>

            <!-- Feedback areas -->
            <div id="error-alert"   class="alert alert-danger  d-none" role="alert"></div>
            <div id="success-alert" class="alert alert-success d-none" role="alert"></div>

            <form id="deposit-form" novalidate>

              <div class="mb-4">
                <label for="amount" class="form-label">Amount (USD)</label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number"
                         id="amount"
                         name="amount"
                         class="form-control"
                         placeholder="0.00"
                         min="0.01"
                         step="0.01"
                         required />
                </div>
                <div class="invalid-feedback">Please enter a valid positive amount.</div>
              </div>

              <button type="submit" id="deposit-btn" class="btn btn-success w-100">
                Deposit
              </button>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const form         = document.getElementById('deposit-form');
    const errorAlert   = document.getElementById('error-alert');
    const successAlert = document.getElementById('success-alert');
    const depositBtn   = document.getElementById('deposit-btn');

    function showError(msg) {
      successAlert.classList.add('d-none');
      errorAlert.textContent = msg;
      errorAlert.classList.remove('d-none');
    }

    function showSuccess(balance) {
      errorAlert.classList.add('d-none');
      const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(balance);
      successAlert.innerHTML = '&#10003; Deposit successful! Your new balance is <strong>' + formatted + '</strong>.';
      successAlert.classList.remove('d-none');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.classList.add('d-none');
      successAlert.classList.add('d-none');

      const amountVal = document.getElementById('amount').value;
      const amount    = parseFloat(amountVal);

      // Client-side validation
      if (!amountVal || isNaN(amount) || amount <= 0) {
        form.classList.add('was-validated');
        return;
      }

      depositBtn.disabled    = true;
      depositBtn.textContent = 'Processing…';

      try {
        const res  = await fetch('/deposit', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ amount }),
        });

        if (res.status === 401 || res.redirected) {
          window.location.href = '/login';
          return;
        }

        const data = await res.json();

        if (res.ok) {
          showSuccess(data.balance);
          form.reset();
          form.classList.remove('was-validated');
        } else {
          showError(data.error || 'Deposit failed. Please try again.');
        }
      } catch (err) {
        showError('Unable to reach the server. Please try again.');
      } finally {
        depositBtn.disabled    = false;
        depositBtn.textContent = 'Deposit';
      }
    });
  </script>

</body>
</html>
