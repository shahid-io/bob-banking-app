<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking Portal — Dashboard</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-md navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand fw-bold">&#127963; SecureBank</span>
      <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-white small" id="nav-username"></span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <h2 class="h4 fw-semibold mb-4" id="greeting">Welcome back!</h2>

        <div class="card border-0 shadow-sm mb-4">
          <div class="card-body p-4 text-center">
            <p class="text-muted mb-1 small text-uppercase letter-spacing-1">Current Balance</p>
            <div id="balance-display" class="display-5 fw-bold text-primary">—</div>
            <p class="text-muted small mt-1">Available funds</p>
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-6">
            <a href="/deposit" class="btn btn-success w-100 py-3">
              <div class="fw-semibold">&#8679; Deposit</div>
              <div class="small opacity-75">Add funds</div>
            </a>
          </div>
          <div class="col-6">
            <a href="/withdraw" class="btn btn-warning w-100 py-3 text-dark">
              <div class="fw-semibold">&#8681; Withdraw</div>
              <div class="small opacity-75">Take funds</div>
            </a>
          </div>
        </div>

        <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

      </div>
    </div>
  </div>

  <script>
    async function loadBalance() {
      try {
        const res = await fetch('/balance');

        if (res.status === 401 || res.redirected) {
          window.location.href = '/login';
          return;
        }

        const data = await res.json();

        if (!res.ok) {
          document.getElementById('error-alert').textContent = data.error || 'Could not load balance.';
          document.getElementById('error-alert').classList.remove('d-none');
          return;
        }

        const formatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(data.balance);
        document.getElementById('balance-display').textContent = formatted;

        const name = data.username || sessionStorage.getItem('username') || 'Customer';
        document.getElementById('greeting').textContent = 'Welcome back, ' + name + '!';
        document.getElementById('nav-username').textContent = name;

      } catch (err) {
        document.getElementById('error-alert').textContent = 'Unable to reach the server.';
        document.getElementById('error-alert').classList.remove('d-none');
      }
    }

    loadBalance();
  </script>

</body>
</html>
