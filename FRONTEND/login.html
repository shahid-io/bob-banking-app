<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking Portal — Login</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-5">

        <!-- Bank brand header -->
        <div class="text-center mb-4">
          <div class="bank-logo mb-2">&#127963;</div>
          <h1 class="h3 fw-bold text-primary">SecureBank</h1>
          <p class="text-muted small">Online Banking Portal</p>
        </div>

        <!-- Login card -->
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h5 mb-4 text-center fw-semibold">Sign in to your account</h2>

            <!-- Error alert — hidden until a login failure occurs -->
            <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" novalidate>

              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control"
                       placeholder="Enter your username"
                       autocomplete="username"
                       required />
                <div class="invalid-feedback">Please enter your username.</div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       autocomplete="current-password"
                       required />
                <div class="invalid-feedback">Please enter your password.</div>
              </div>

              <button type="submit" id="login-btn" class="btn btn-primary w-100">
                Log In
              </button>

            </form>
          </div>
        </div>

        <!-- Demo credentials hint -->
        <p class="text-center text-muted small mt-3">
          Demo accounts: alice / bob / carol &nbsp;|&nbsp; passwords: password123 / password456 / password789
        </p>

      </div>
    </div>
  </div>

  <script>
    const form       = document.getElementById('login-form');
    const errorAlert = document.getElementById('error-alert');
    const loginBtn   = document.getElementById('login-btn');

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.remove('d-none');
    }

    function hideError() {
      errorAlert.classList.add('d-none');
      errorAlert.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Client-side presence validation
      if (!username || !password) {
        form.classList.add('was-validated');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (res.ok) {
          // Store display name for the dashboard greeting
          sessionStorage.setItem('username', username);
          window.location.href = '/dashboard';
        } else {
          showError(data.error || 'Login failed. Please try again.');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Log In';
        }
      } catch (err) {
        showError('Unable to reach the server. Please try again.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });
  </script>

</body>
</html>
