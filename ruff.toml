[tool.ruff]
# Target Python 3.11+
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# Enable a broad set of rules:
#   E/W = pycodestyle errors/warnings
#   F   = pyflakes
#   I   = isort
#   B   = flake8-bugbear
#   C4  = flake8-comprehensions
#   UP  = pyupgrade (modernise syntax)
#   A   = flake8-builtins (avoid shadowing builtins)
#   PT  = flake8-pytest-style
select = ["E", "W", "F", "I", "B", "C4", "UP", "A", "PT"]

ignore = [
    # Allow assert in non-test code (used for type narrowing in services.py)
    "B011",
    # Allow 'id' as a parameter name (used in ServiceResult)
    "A002",
]

[tool.ruff.lint.per-file-ignores]
# Test files: allow longer lines, magic values, and assert statements
"tests/**" = ["E501", "PT011", "S101"]

[tool.ruff.lint.isort]
known-first-party = ["models", "services", "routes", "config"]

[tool.black]
line-length = 100
target-version = ["py311"]
